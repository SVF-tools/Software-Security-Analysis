name: build

# Triggers the workflow on push or pull request events
on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      XCODE_VERSION: 'latest-stable'
    steps:
      # checkout the repo
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # setup the mac/ubuntu environment
      - name: mac-setup
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
      - name: mac-setup-workaround
        if: runner.os == 'macOS'
        run: |
          XCODE_PATH=$(dirname "$(dirname "$(xcode-select -p)")")
          sudo ln -sfn "$XCODE_PATH" /Applications/Xcode.app
      - name: ubuntu-setup
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install cmake gcc g++ nodejs doxygen graphviz lcov libncurses5-dev libtinfo6 libzstd-dev

      # install llvm and svf
      - name: env-setup
        run: |
          npm install svf-lib
      # set SVF_DIR, LLVM_DIR and Z3_DIR and build
      - name: build
        run: |
          export SVF_DIR=$(npm root)/SVF
          export LLVM_DIR=$(npm root)/llvm-21.1.0.obj
          export Z3_DIR=$(npm root)/z3.obj
          echo "SVF_DIR="$SVF_DIR
          echo "LLVM_DIR="$LLVM_DIR
          echo "Z3_DIR="$Z3_DIR
          cmake .
          make
